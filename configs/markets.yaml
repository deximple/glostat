# GLOSTAT v1.1 — markets.yaml
# v1.0: XNAS, XNYS production-active. v1.1 (this PR): XKRX + XKOS promoted from
# phase1d_research → production after K1 KR support landed (universe + Naver flow).
# Phase 3+ remains global expansion (XJPX, XHKG, XLON, ...).

schema_version: 2
mvp_scope:
  rationale: "v1.1 production set: US large-cap + KR KOSPI 200. UAID is bare-ticker tolerant for KR (6-digit code) and US."
  permitted_markets: [XNAS, XNYS, XKRX, XKOS]
  bare_ticker_allowed: true   # 6-digit KR codes + US tickers both unambiguous in MVP scope

markets:
  XNAS:
    mic: XNAS
    name: NASDAQ
    country: US
    currency: USD
    tz: America/New_York
    sessions:
      - { name: pre_market,    open_local: "04:00", close_local: "09:30",
          open_utc: "09:00",  close_utc: "14:30" }
      - { name: regular,       open_local: "09:30", close_local: "16:00",
          open_utc: "14:30", close_utc: "21:00" }
      - { name: after_market,  open_local: "16:00", close_local: "20:00",
          open_utc: "21:00", close_utc: "01:00+1d" }
    settlement: T+1   # SEC rule effective 2024-05-28
    settlement_days: 1
    fee_bps: 0.6          # broker commission proxy (Sprint 1 PR #1 cost-gate)
    tax_bps_buy: 0.0
    tax_bps_sell: 0.24    # SEC fee + FINRA TAF blended
    daily_limit_pct: null
    tick_size: 1c
    holidays_calendar: us_2026.yaml
    bigdata_mcp_coverage: HIGH
    foreign_access: open

  XNYS:
    mic: XNYS
    name: New York Stock Exchange
    country: US
    currency: USD
    tz: America/New_York
    sessions:
      - { name: pre_market,    open_local: "04:00", close_local: "09:30",
          open_utc: "09:00",  close_utc: "14:30" }
      - { name: regular,       open_local: "09:30", close_local: "16:00",
          open_utc: "14:30", close_utc: "21:00" }
      - { name: after_market,  open_local: "16:00", close_local: "20:00",
          open_utc: "21:00", close_utc: "01:00+1d" }
    settlement: T+1
    settlement_days: 1
    fee_bps: 0.6          # broker commission proxy (Sprint 1 PR #1 cost-gate)
    tax_bps_buy: 0.0
    tax_bps_sell: 0.24
    daily_limit_pct: null
    tick_size: 1c
    holidays_calendar: us_2026.yaml
    bigdata_mcp_coverage: HIGH
    foreign_access: open

  XKRX:
    mic: XKRX
    name: Korea Exchange (KOSPI)
    country: KR
    currency: KRW
    tz: Asia/Seoul
    sessions:
      - { name: regular, open_local: "09:00", close_local: "15:30",
          open_utc: "00:00", close_utc: "06:30" }
    settlement: T+2
    settlement_days: 2
    fee_bps: 1.5            # KRX broker commission proxy (0.015%)
    tax_bps_buy: 0.0
    tax_bps_sell: 20.0      # KR transaction tax 0.20% sell-side
    daily_limit_pct: 30
    holidays_calendar: kr_2026.yaml
    bigdata_mcp_coverage: LOW
    foreign_access: open
    yfinance_suffix: ".KS"  # v1.1: KR 6-digit ticker → yfinance lookup needs .KS
    notes: "v1.1 production. all_in_bps ≈ 22 round-trip (incl. spread)."
  XKOS:
    mic: XKOS
    name: KOSDAQ
    country: KR
    currency: KRW
    tz: Asia/Seoul
    sessions:
      - { name: regular, open_local: "09:00", close_local: "15:30",
          open_utc: "00:00", close_utc: "06:30" }
    settlement: T+2
    settlement_days: 2
    fee_bps: 1.5
    tax_bps_buy: 0.0
    tax_bps_sell: 18.0
    daily_limit_pct: 30
    holidays_calendar: kr_2026.yaml
    bigdata_mcp_coverage: LOW
    foreign_access: open
    yfinance_suffix: ".KQ"
    notes: "v1.1 production. all_in_bps ≈ 20 round-trip."

# Phase 1D research-only entries (NOT active production routing).
# Cost models used by phase1d hindcast modules; not registered for DataRouter dispatch.
phase1d_research:
  BINANCE_PERP:
    mic: BINANCE_PERP
    name: Binance USDM Perpetual Futures
    country: KY
    currency: USDT
    tz: UTC
    settlement_days: 0
    fee_bps: 4.0
    tax_bps_buy: 0.0
    tax_bps_sell: 0.0
    foreign_access: open
    notes: "Hindcast-only. 8h funding accrual; all_in_bps ≈ 6 round-trip mostly-maker."

# Phase 2 후보 (현재 비활성, 주석으로만 유지)
# XTAI: Taiwan SE, XJPX: Tokyo, XHKG: Hong Kong, XSHG/XSHE: Shanghai/Shenzhen
# XLON: London, XAMS: Euronext Amsterdam, XPAR: Euronext Paris
