  # ───────── v1.4: TITAN-derived sizing & confidence model — N3/N4 ─────────
  INV-GS-111:
    summary: "Prediction.dca_sizing field is INFORMATION ONLY (calibration-derived sizing tier %); does NOT constitute a BUY/SELL recommendation. INV-GS-101 preserved."
    enforcement: information_only_attachment
    source: docs/DCA_SIZING.md (v1.4 N3 addendum) + TITAN L4 W-value §6
    active_in: [v1.4]
    enforce_at:
      - predictor.dca_sizing.SizingRecommendation
      - predictor.dca_sizing.build_sizing_recommendation
      - predictor.composite.predict
      - cli_predict_print.print_prediction
    note: "TITAN L4 W = 0.30·R + 0.25·T + 0.25·V + 0.20·S (cap 3.5) is reframed for prediction-tool use: R from regime/macro thesis, T from time/convergence thesis, V from fundamental thesis, S from composite edge. SizingRecommendation.tier ∈ {wait, explore, base, active, aggressive} and disclaimer carries explicit INFORMATION ONLY language. INV-GS-101 (no BUY/SELL output) preserved — sizing tier is calibration-derived data, not action label."

  INV-GS-112:
    summary: "confidence_v2 uses 5-component geometric mean (TITAN chart_pattern pattern); composite weight = brier_weight × confidence_v2_factor."
    enforcement: weighting_modifier
    source: docs/CONFIDENCE_V2.md (v1.4 N4 addendum) + TITAN chart_pattern.py _compute_confidence
    active_in: [v1.4]
    enforce_at:
      - predictor.confidence_v2.compute_confidence_v2
      - predictor.confidence_v2.confidence_v2_from_calibration
      - predictor.composite._weight_for_v2
      - predictor.composite._compute_masses
      - predictor.composite._attach_confidence_v2
    note: "Components: sample_quality = log(min(n, 1000))/log(1000), effective_size_factor = sqrt(n/(n+50)), score_stability = 1 - std/mean of rolling AUCs, return_consistency = 1 - |IS - OOS|/max(|IS|, 0.1), recency_quality = exp(-days/90). composite = (c1·c2·c3·c4·c5)^(1/5). Geometric mean gives weakest-link behaviour: a single weak component (e.g. n=0 or stale calibration) collapses composite confidence to ~0, so brier_weight × confidence_v2_factor ≈ 0 and the composite predictor falls back to the base rate prior."

  # ───────── v1.4.1: X+W honesty patch (P8 Statistician + P10 Contrarian) ─────────
  INV-GS-113:
    summary: "Output honesty: CI label clarifies 1-sigma (~68%); CI-includes-0 flag; n=0 thesis 'no data' line; AUC z-score / p-value annotation; composite all-noise statistical disclaimer."
    enforcement: presentation_layer
    source: docs/post_mortem/V141_HONESTY_PATCH.md (P8 Statistician panel)
    active_in: [v1.4.1]
    enforce_at:
      - predictor.honesty.auc_z_score
      - predictor.honesty.auc_p_value
      - predictor.honesty.is_statistically_significant
      - predictor.honesty.format_significance
      - predictor.honesty.ci_includes_zero
      - predictor.honesty.all_active_signals_are_noise
      - cli_predict_print.print_prediction
      - cli_predict_print._print_signal_line
      - cli_predict_print._maybe_print_significance_disclaimer
    note: "Presentation-only — composite predictor logic unchanged. AUC SE ≈ 1/sqrt(12·n) under H0; two-tailed p via erf-based normal CDF. When every active signal has p > 0.05, surface 'statistically indistinguishable from base rate' disclaimer so the user reads the +/- edge in the right context. Round-trip transaction cost subtracted from expected_return for human-facing line."

  INV-GS-114:
    summary: "Universe-specific honesty footer: KR megacap (XKRX/XKOS) predictions surface a Phase KR M1 measured-AUC <= 0.51 disclosure so the user reads the probability output as a screening prior."
    enforcement: presentation_layer
    source: docs/post_mortem/V141_HONESTY_PATCH.md (P10 Contrarian Veteran panel)
    active_in: [v1.4.1]
    enforce_at:
      - predictor.honesty.kr_megacap_honesty_note
      - cli_predict_print._maybe_print_universe_note
    note: "Phase KR M1 hindcast measured E_FUNDAMENTAL_KR AUC=0.495 (n=3510), E_TIME_KR AUC=0.483 — both statistically indistinguishable from random. Honest disclosure gives the user the full context for any KR megacap probability output. Non-KR markets (XNAS/XNYS) emit no extra footer. Future v1.5+ work (sector-aware E_FUNDAMENTAL_KR_CYCLICAL, E_PEAD_KR event calendar) will reduce the KR megacap honesty footer's necessity once new experts pass the same statistical test."

