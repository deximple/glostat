  # ───────── v1.10.6: VKOSPI mood expert (KR asymmetric event-conditional) ─────────
  INV-GS-134:
    summary: "E_VKOSPI_MOOD_KR encodes Lee/Son/Lee (2024) finding: KR investors over-react to fear (VKOSPI↑ + r<-10% → 20d reversal +2.43% ***) and under-react to greed (VKOSPI↓ + r>+10% → 20d drift +2.11% ***), p<0.001 over 18 years. Misaligned (↑↑ / ↓↓) and below-threshold (|r|<10%) cells emit NEUTRAL direction. Small-cap multiplier 1.5x reflects paper Table 5A's +9.21% small-cap drift effect. Universe: KOSPI 200 only. Live VKOSPI fetcher deferred via VkospiClient.set_history_provider plug-in (KRX session-cookie or Naver scrape backend in follow-up wave)."
    enforcement: expert_and_data_provider
    source: "Lee/Son/Lee (2024) 금융정보연구 13(1) + KRX (2009) 변동성지수 해설 + docs/CALIBRATION_AUDIT_2026-05-02.md (audit identified KR megacap thesis gap)"
