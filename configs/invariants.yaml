  # ───────── v1.0: Prediction Tool Reframe (101-105) — 개선된 TITAN ─────────
  INV-GS-101:
    summary: "Output is probability distribution + confidence interval. BUY/SELL action output forbidden."
    enforcement: type_gate
    source: PLAN_v1.0 §3, §5.1
    active_in: [v1.0]
    enforce_at: [predictor.composite, cli.predict, glostat.core.types.Prediction]
    note: "v1.0 reframe core. Prediction dataclass에는 action/target_price/stop_price/suggested_size_pct/directive 필드가 존재하지 않는다. AttributeError raise."

  INV-GS-102:
    summary: "Every prediction must cite source signals + calibration period + n_samples."
    enforcement: provenance_required
    source: PLAN_v1.0 §3, §5.1
    active_in: [v1.0]
    enforce_at: [glostat.core.types.Prediction.__post_init__]
    note: "Prediction.contributing 비어있으면 ValueError. 각 ThesisContribution은 calibration_window + n_calibration_samples + auc 필수."

  INV-GS-103:
    summary: "Composite probability uses Brier-score-weighted ensemble (not simple mean)."
    enforcement: weighting_algorithm
    source: PLAN_v1.0 §4.2, §5.1
    active_in: [v1.0]
    enforce_at: [predictor.composite.composite_p_up, predictor.composite.thesis_weight]
    note: "단순 평균 금지. weight = sigmoid(-20 × (Brier - 0.25)) × min(1, n/50). Sample-size guard 강제."

  INV-GS-104:
    summary: "Per-prediction disclaimer: personal use, not investment advice (extends INV-GS-024)."
    enforcement: compliance_per_output
    source: PLAN_v1.0 §6.1, §5.1
    active_in: [v1.0]
    enforce_at: [glostat.core.types.Prediction.__post_init__, glostat.risk.compliance_gate]
    note: "INV-GS-024 (broadcast 영구 금지)를 강화. 매 Prediction은 non-empty disclaimer 필드를 가지며 construction time validation. 우회 시도는 PR auto-reject."

  INV-GS-105:
    summary: "Quarterly recalibration: full thesis hindcast re-run + calibration_table.parquet update."
    enforcement: scheduled_recalibration
    source: PLAN_v1.0 §8, §5.1
    active_in: [v1.0]
    enforce_at: [cli.calibrate, predictor.calibration]
    note: "Q1 (Jan 31) / Q2 (Apr 30) / Q3 (Jul 31) / Q4 (Oct 31). 2 분기 이상 미갱신 시 weight 자동 0.5× degrade + 사용자 경고."

  # ───────── v1.1: KR (Korea Exchange) production support — K1 ─────────
  INV-GS-106:
    summary: "KR tickers normalize to 6-digit format internally; yfinance fetch auto-appends .KS suffix."
    enforcement: ticker_normalization
    source: docs/KR_SUPPORT.md (v1.1 K1 addendum)
    active_in: [v1.1]
    enforce_at:
      - data.data_router.is_kr_ticker
      - data.data_router.normalize_kr_ticker
      - data.data_router.to_yfinance_kr_ticker
      - data.yfinance_client._yf_ticker
      - predictor.kr_universe.kr_canonical
    note: "KR universe is canonical 6-digit (e.g. 005930 for Samsung). yfinance lookup transparently appends .KS for KOSPI / .KQ for KOSDAQ. Snapshot Broker UAID encodes XKRX/XKOS prefix (XKRX.005930). Universe membership tested via configs/universes/kospi200.txt (200 tickers, snapshot 2026-04-29)."

  INV-GS-107:
    summary: "DART API key required for KR insider/fundamentals enhancement; absence skips cleanly."
    enforcement: graceful_degradation
    source: docs/DART_API_SETUP.md (v1.2 L2 addendum)
    active_in: [v1.2]
    enforce_at:
      - data.dart_client.DartApiKeyMissingError
      - data.dart_client.is_dart_configured
      - experts.e_insider_kr.EInsiderKrExpert.from_env
      - experts.e_fundamental_kr.EFundamentalKrExpert._enrich_with_dart
      - predictor.thesis_wrappers.collect_contributions
    note: "DART OpenAPI is the canonical KR equivalent of SEC EDGAR. When GLOSTAT_DART_API_KEY is unset, E_INSIDER_KR reports a universe-aware skip and E_FUNDAMENTAL_KR falls back to yfinance-only fields. Setup guide: docs/DART_API_SETUP.md (free 10,000 calls/day)."

  INV-GS-108:
    summary: "ECOS API key required for KR macro signal (E_MACRO_KR); 10 req/sec rate-limit; Snapshot Broker integration mandatory."
    enforcement: graceful_degradation
    source: docs/ECOS_API_SETUP.md (v1.3 M2 addendum)
    active_in: [v1.3]
    enforce_at:
      - data.ecos_client.EcosApiKeyMissingError
      - data.ecos_client.is_ecos_configured
      - data.ecos_client.EcosClient._record_snapshot
      - experts.e_macro_kr.EMacroKrExpert.from_env
      - predictor.thesis_wrappers.collect_contributions
    note: "ECOS (한국은행 경제통계시스템) OpenAPI is the canonical KR macro source. When GLOSTAT_ECOS_API_KEY is unset, E_MACRO_KR reports a universe-aware skip with a setup pointer. With key set, BoK base rate / KRW-USD / CPI / KOSPI series feed a 4-component macro score for any KR ticker. Setup guide: docs/ECOS_API_SETUP.md (free 10,000 calls/day)."

