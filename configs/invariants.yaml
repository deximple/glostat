    note: "12 caveats baked into module docstring: zero-cost academic measurement (KRX RT 23bps), look-ahead ambiguity (next-day-open execution), multiple-testing un-corrected, R²/IC unreported, low frequency (~1.3 events/yr/ticker), alpha-decay risk (paper data ends 2022-07), price-limit fills, VKOSPI noise, lag-0-only correlation (KRX 2009), institutional bias of KRX-published study, 3-lag mean reversion baseline, calibration-not-prediction framing. n=0 bootstrap until phase_kr_vkospi_mood hindcast measures OOS AUC/Sharpe; INV-GS-103 + INV-GS-133 keep composite weight = 0 until then."

  # ───────── v1.10.4: OOS-stability factor in composite weighting ─────────
  INV-GS-133:
    summary: "Composite _weight_for() multiplies brier_weight by an OOS-stability factor: factor = max(0.10, 1 - 0.9 * clip(oos_degradation, 0, 1)). Theses with OOS_degradation ≥ 100% (IS edge dies OOS) get weight floored to 10% of brier_weight, preventing the IS-only edge from steering the composite. Closes the 2026-05-02 audit finding that 5 of 8 measured theses had OOS_degradation ≥ 100% but carried full Brier weight."
    enforcement: composite_weighting
    source: docs/CALIBRATION_AUDIT_2026-05-02.md (audit table, 2026-05-02 post-hindcast)
    active_in: [v1.10.4]
    enforce_at:
      - predictor.composite._oos_stability_factor
      - predictor.composite._weight_for
      - predictor.composite._weight_for_v2 (transitively, via _weight_for)
      - predictor.composite._OOS_STABILITY_FLOOR
      - predictor.composite._OOS_PENALTY_SCALE
    note: "Floor 0.10 (not 0) so unstable theses still surface in contributing_signals at minimal weight rather than silently disappearing. Concrete impact 2026-05-02: E_PEAD weight 0.172→0.017 (115% OOS deg), E_FOMC_DRIFT 0.286→0.029, E_FX_CARRY 0.200→0.020, E_SECTOR_ROTATION 0.060→0.006. KEPT: E_FOREIGN_REVERSAL 0.067 (0% deg), E_FUNDAMENTAL 0.082 (20% deg), E_TIME 0.035 (15% deg). Composite is now driven by OOS-stable theses, not by IS-only darlings."

