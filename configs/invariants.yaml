  # ───────── v1.0: Prediction Tool Reframe (101-105) — 개선된 TITAN ─────────
  INV-GS-101:
    summary: "Output is probability distribution + confidence interval. BUY/SELL action output forbidden."
    enforcement: type_gate
    source: PLAN_v1.0 §3, §5.1
    active_in: [v1.0]
    enforce_at: [predictor.composite, cli.predict, glostat.core.types.Prediction]
    note: "v1.0 reframe core. Prediction dataclass에는 action/target_price/stop_price/suggested_size_pct/directive 필드가 존재하지 않는다. AttributeError raise."

  INV-GS-102:
    summary: "Every prediction must cite source signals + calibration period + n_samples."
    enforcement: provenance_required
    source: PLAN_v1.0 §3, §5.1
    active_in: [v1.0]
    enforce_at: [glostat.core.types.Prediction.__post_init__]
    note: "Prediction.contributing 비어있으면 ValueError. 각 ThesisContribution은 calibration_window + n_calibration_samples + auc 필수."

  INV-GS-103:
    summary: "Composite probability uses Brier-score-weighted ensemble (not simple mean)."
    enforcement: weighting_algorithm
    source: PLAN_v1.0 §4.2, §5.1
    active_in: [v1.0]
    enforce_at: [predictor.composite.composite_p_up, predictor.composite.thesis_weight]
    note: "단순 평균 금지. weight = sigmoid(-20 × (Brier - 0.25)) × min(1, n/50). Sample-size guard 강제."

  INV-GS-104:
